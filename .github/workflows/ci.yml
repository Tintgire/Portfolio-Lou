name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Version picked up from packageManager field in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Version picked up from packageManager field in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          RESEND_API_KEY: dummy
          CONTACT_EMAIL_TO: dummy@example.com

  lighthouse:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Version picked up from packageManager field in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
        env:
          RESEND_API_KEY: dummy
          CONTACT_EMAIL_TO: dummy@example.com
      - name: Run Lighthouse CI
        run: |
          pnpm dlx @lhci/cli@0.13.x autorun \
            --collect.startServerCommand="pnpm start" \
            --collect.url="http://localhost:3000/fr" \
            --collect.numberOfRuns=1 \
            --assert.preset="lighthouse:recommended" \
            --assert.assertions.categories:performance="['error', { minScore: 0.85 }]"
